version: "3.8"

services:
  db:
    # pgvector image (postgres 15 + vector extension). The embedding stack
    # was removed (migration 0018) but the image stays: it is drop-in
    # compatible with vanilla postgres:15 and the existing pg_data volume
    # migrates without recreate.
    image: pgvector/pgvector:pg15
    # Credentials match the local-dev `.env` (DB_USER=postgres / DB_PASSWORD=postgres)
    # so `docker compose up` and bare-metal Django agree on creds.
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: seo_db
    # Host port remapped to 5433 to avoid collision with an unrelated
    # `compliance-postgres` container that holds host:5432. In-network port
    # remains 5432, so api/worker continue to use DB_HOST=db, DB_PORT=5432.
    # Host-side tools (bare-metal pytest, psql) must connect to localhost:5433.
    # Host port 5434 (5432 + 5433 both taken by unrelated containers).
    # In-network port stays 5432 so api/worker config is unchanged.
    ports: ["5434:5432"]
    volumes: [pg_data:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  # ── LanguageTool grammar + style checker (40 languages) ───────────────────
  # Self-hosted Docker image — no subscription, runs entirely in our VPC.
  # The crawler hits http://languagetool:8010/v2/check with body text per
  # page; LT returns rich grammar/style/spelling findings. Backend opts in
  # via CRAWLER_LANGUAGETOOL_URL in .env (default: empty → falls back to
  # pyspellchecker, the existing Phase C.4 implementation).
  #
  # Memory: ~1.5-2 GB resident. CPU: bursts during analysis, idle between.
  # Port 8010 internal; expose 8011 on host only for ad-hoc curl testing.
  languagetool:
    image: erikvl87/languagetool:latest
    environment:
      Java_Xms: "512m"
      Java_Xmx: "1500m"
    ports: ["8011:8010"]
    restart: unless-stopped

  backend:
    build: { context: ./backend }
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    # Host :8000 matches the default Vite proxy target in frontend/web/vite.config.ts.
    ports: ["8000:8000"]
    env_file: [.env]
    # Override the localhost values in `.env` with compose-network service names
    # so the stack boots from a clean clone via `docker compose up`. `.env` stays
    # localhost-friendly for bare-metal dev workflows.
    environment:
      DB_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    # Crawl outputs are file-backed (CSV + crawl_state.json + XLSX reports).
    # Bind-mount the two output dirs so they survive `docker compose down`.
    # Source code is also bind-mounted in dev so Python edits land
    # instantly via Django's StatReloader — no rebuild needed. For prod
    # the source-mount must be removed (use a compose override file)
    # so the baked image is the source of truth.
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
      - ./backend/reports:/app/reports
    depends_on: [db, redis]

  # ── Celery workers (Phase 5 queue isolation) ──────────────────────────
  # Three queues so RAM-hungry crawl tasks can't starve the fast LLM /
  # ad-hoc / grade tasks that share the default queue. Each container
  # runs the same image but listens on a different `-Q`. Queue routing
  # is defined in backend/config/celery.py::task_routes.
  #
  # Service name `worker` (singular) is kept as an alias for the default
  # queue so existing `docker compose exec worker …` muscle-memory
  # continues to work.
  worker:
    build: { context: ./backend }
    command: celery -A config worker -l info -Q default --concurrency=4
    env_file: [.env]
    environment:
      DB_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DJANGO_ALLOW_ASYNC_UNSAFE: "true"
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
      - ./backend/reports:/app/reports
    depends_on: [db, redis]

  worker_bajaj:
    build: { context: ./backend }
    # Bajaj nightly crawl: Playwright drives Chromium → RAM-heavy. One
    # task at a time. Restarts every 20 tasks to recycle Chromium
    # subprocesses (see worker_max_tasks_per_child in celery.py).
    command: celery -A config worker -l info -Q bajaj_crawl --concurrency=1
    env_file: [.env]
    environment:
      DB_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DJANGO_ALLOW_ASYNC_UNSAFE: "true"
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
      - ./backend/reports:/app/reports
    depends_on: [db, redis]

  worker_comp:
    build: { context: ./backend }
    # Competitor walks + content-map refresh. Scrapy already concurrent-
    # crawls within a single domain; we run two workers so two domains
    # walk in parallel without RAM blow-up.
    command: celery -A config worker -l info -Q comp_crawl --concurrency=2
    env_file: [.env]
    environment:
      DB_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DJANGO_ALLOW_ASYNC_UNSAFE: "true"
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
      - ./backend/reports:/app/reports
    depends_on: [db, redis]

  # ── Celery beat — fires the periodic tasks defined in
  # core/scheduler/scheduler.py::CELERY_BEAT_SCHEDULE. Separate from
  # ``worker`` so beat can be paused (compose stop beat) without
  # killing live task execution. Uses the same image + bind mount so
  # schedule edits land via the same Django reload path.
  beat:
    build: { context: ./backend }
    command: celery -A config beat -l info --pidfile=/tmp/celerybeat.pid
    env_file: [.env]
    environment:
      DB_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
      - ./backend/reports:/app/reports
    depends_on: [db, redis, worker]
    restart: unless-stopped

volumes:
  pg_data:
