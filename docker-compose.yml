version: "3.8"

services:
  db:
    image: postgres:15
    # Credentials match the local-dev `.env` (DB_USER=postgres / DB_PASSWORD=postgres)
    # so `docker compose up` and bare-metal Django agree on creds.
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: seo_db
    # Host port remapped to 5433 to avoid collision with an unrelated
    # `compliance-postgres` container that holds host:5432. In-network port
    # remains 5432, so api/worker continue to use DB_HOST=db, DB_PORT=5432.
    # Host-side tools (bare-metal pytest, psql) must connect to localhost:5433.
    ports: ["5433:5432"]
    volumes: [pg_data:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  # ── LanguageTool grammar + style checker (40 languages) ───────────────────
  # Self-hosted Docker image — no subscription, runs entirely in our VPC.
  # The crawler hits http://languagetool:8010/v2/check with body text per
  # page; LT returns rich grammar/style/spelling findings. Backend opts in
  # via CRAWLER_LANGUAGETOOL_URL in .env (default: empty → falls back to
  # pyspellchecker, the existing Phase C.4 implementation).
  #
  # Memory: ~1.5-2 GB resident. CPU: bursts during analysis, idle between.
  # Port 8010 internal; expose 8011 on host only for ad-hoc curl testing.
  languagetool:
    image: erikvl87/languagetool:latest
    environment:
      Java_Xms: "512m"
      Java_Xmx: "1500m"
    ports: ["8011:8010"]
    restart: unless-stopped

  backend:
    build: { context: ./backend }
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    # Host :8000 matches the default Vite proxy target in frontend/web/vite.config.ts.
    ports: ["8000:8000"]
    env_file: [.env]
    # Override the localhost values in `.env` with compose-network service names
    # so the stack boots from a clean clone via `docker compose up`. `.env` stays
    # localhost-friendly for bare-metal dev workflows.
    environment:
      DB_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    # Crawl outputs are file-backed (CSV + crawl_state.json + XLSX reports).
    # Bind-mount the two output dirs so they survive `docker compose down`.
    # Source code is also bind-mounted in dev so Python edits land
    # instantly via Django's StatReloader — no rebuild needed. For prod
    # the source-mount must be removed (use a compose override file)
    # so the baked image is the source of truth.
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
      - ./backend/reports:/app/reports
    depends_on: [db, redis]

  worker:
    build: { context: ./backend }
    # Celery app lives at backend/config/celery.py and is exported as
    # `celery_app` from backend/config/__init__.py — `-A config` resolves it.
    command: celery -A config worker -l info
    env_file: [.env]
    environment:
      DB_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
      - ./backend/reports:/app/reports
    depends_on: [db, redis]

volumes:
  pg_data:
